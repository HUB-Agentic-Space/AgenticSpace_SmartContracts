[profile.default]
src = "contracts"
out = "foundry-out"
libs = ["node_modules", "lib"]
solc_version = "0.8.28"
via_ir = true
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
gas_reports = ["*"]

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536
seed = "0x1"

[profile.default.invariant]
runs = 256
depth = 15
fail_on_revert = false
call_override = false

[profile.ci]
fuzz = { runs = 1000 }
invariant = { runs = 500, depth = 30 }
